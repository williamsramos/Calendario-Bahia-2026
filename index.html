<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Temporada do Esquadrão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Topo da Página / Header -->
    <header id="main-header">
        <div class="header-container">
            <h1>Temporada do Esquadrão</h1>
            
            <!-- Controle do Seletor Dinâmico de Ano/Temporada -->
            <div class="season-control">
                <label for="season-select">Temporada Ativa:</label>
                <select id="season-select" onchange="mudarTemporada(this.value)">
                    <option value="2026">2026 (Legado)</option>
                    <option value="2027">2027 (Limpa)</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Barra Dinâmica de Progresso da Temporada -->
    <div class="progress-container">
        <div class="progress-label">Progresso Geral da Temporada: <span id="progress-percentage">0%</span></div>
        <div class="progress-bar-bg">
            <div id="progress-fill" style="width: 0%;"></div>
        </div>
    </div>

    <!-- Layout em Grade Principal -->
    <div class="dashboard-grid">
        
        <!-- COLUNA DA ESQUERDA: Jogos e Filtros -->
        <div class="left-column">
            
            <!-- Menu de Abas por Tipo de Campeonato -->
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchTab('todas', event)">Todos</button>
                <button class="tab-btn" onclick="switchTab('estadual-tab', event)">Estadual</button>
                <button class="tab-btn" onclick="switchTab('1-turno', event)">1º Turno</button>
                <button class="tab-btn" onclick="switchTab('2-turno', event)">2º Turno</button>
                <button class="tab-btn" onclick="switchTab('copas-tab', event)">Copas</button>
            </div>

            <!-- Filtros de Mando de Campo -->
            <div class="filter-menu">
                <button class="filter-btn active" onclick="filterMando('todos-jogos', event)">Todos os Mandos</button>
                <button class="filter-btn" onclick="filterMando('mandante', event)">Como Mandante</button>
                <button class="filter-btn" onclick="filterMando('visitante', event)">Como Visitante</button>
            </div>

            <!-- Listagem de containers gerenciados pelo Javascript -->
            <main id="main-content">
                <!-- Seção 1: Campeonato Estadual -->
                <section class="campeonato-secao" id="sec-estadual">
                    <h2 class="secao-titulo">Campeonato Estadual</h2>
                    <div id="estadual-container"></div>
                </section>

                <!-- Seção 2: Brasileirão -->
                <section class="campeonato-secao" id="sec-brasileirao">
                    <h2 class="secao-titulo">Campeonato Brasileiro</h2>
                    <div id="brasileirao-containers"></div>
                </section>

                <!-- Seção 3: Copas Internas/Continentais -->
                <section class="campeonato-secao" id="sec-copas">
                    <h2 class="secao-titulo">Copas</h2>
                    <div id="copas-container"></div>
                </section>
            </main>
        </div>

        <!-- COLUNA DA DIREITA: Classificação, Painel Admin & Cards -->
        <div class="right-column">
            
            <!-- Painel de Indicadores Rápidos -->
            <div class="widgets-row">
                <div class="widget-card">🎁 Posição Atual: <span id="stat-posicao">1º</span></div>
                <div class="widget-card">⭐ Pontos Ganhos: <span id="stat-pontos">0</span></div>
            </div>

            <div class="widgets-row">
                <div class="widget-card">V: <span id="stat-vitorias">0</span> | E: <span id="stat-empates">0</span> | D: <span id="stat-derrotas">0</span></div>
                <div class="widget-card">Aproveitamento: <span id="stat-aproveitamento">0%</span></div>
            </div>

            <!-- Tabela Visual de Classificação Simulada -->
            <div class="table-card">
                <h3>Classificação do Campeonato</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Time</th>
                            <th>P</th>
                            <th>J</th>
                            <th>V</th>
                            <th>E</th>
                            <th>D</th>
                            <th>SG</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        <!-- Gerado Dinamicamente por Javascript -->
                    </tbody>
                </table>
            </div>

            <!-- Painel Administrativo de Inserção de Jogos -->
            <div id="admin-panel" class="form-card">
                <h3>Adicionar Novo Jogo ao Calendário</h3>
                
                <div class="form-group">
                    <label>Competição:</label>
                    <select id="competition-type" onchange="toggleCompetitionOptions()">
                        <option value="brasileirao">Campeonato Brasileiro</option>
                        <option value="estadual">Campeonato Estadual</option>
                        <option value="copas">Copas (Libertadores / Copa do Brasil)</option>
                    </select>
                </div>

                <div class="form-group">
                    <!-- Seletores dinâmicos de sub-categorias ocultáveis -->
                    <select id="rodada-select">
                        <script>
                            for (let i = 1; i <= 38; i++) {
                                document.write(`<option value="${i}">${i}ª Rodada</option>`);
                            }
                        </script>
                    </select>

                    <select id="estadual-rodada-select" style="display: none;">
                        <script>
                            for (let i = 1; i <= 12; i++) {
                                document.write(`<option value="${i}">${i}ª Rodada (Estadual)</option>`);
                            }
                        </script>
                    </select>

                    <select id="copa-fase" style="display: none;">
                        <option value="Copa do Brasil • Fase Iniciais">Copa do Brasil - Fase Inicial</option>
                        <option value="Copa do Brasil • Oitavas">Copa do Brasil - Oitavas de Final</option>
                        <option value="Copa do Brasil • Quartas">Copa do Brasil - Quartas de Final</option>
                        <option value="Copa do Brasil • Semifinal">Copa do Brasil - Semifinal</option>
                        <option value="Copa do Brasil • Final">Copa do Brasil - Final</option>
                        <option value="Libertadores • Fase de Grupos">Libertadores - Grupos</option>
                        <option value="Libertadores • Oitavas">Libertadores - Oitavas</option>
                        <option value="Libertadores • Quartas">Libertadores - Quartas</option>
                        <option value="Libertadores • Semifinal">Libertadores - Semifinal</option>
                        <option value="Libertadores • Final">Libertadores - Final</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data:</label>
                        <input type="text" id="date" placeholder="Ex: 14/04">
                    </div>
                    <div class="form-group">
                        <label>Horário:</label>
                        <input type="text" id="time" placeholder="Ex: 16:00">
                    </div>
                </div>

                <div class="form-group">
                    <label>Estádio / Informações Extras:</label>
                    <input type="text" id="info" placeholder="Ex: Arena Fonte Nova">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Mandante:</label>
                        <input type="text" id="team1" placeholder="Ex: bahia">
                    </div>
                    <div class="form-group">
                        <label>Visitante:</label>
                        <input type="text" id="team2" placeholder="Ex: flamengo">
                    </div>
                </div>

                <div class="form-group">
                    <label>Placar Inicial (Opcional):</label>
                    <input type="text" id="score" placeholder="Ex: x ou 2 x 1">
                </div>

                <button class="btn-primary" onclick="saveGame()">Salvar Partida</button>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
